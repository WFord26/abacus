name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint, typecheck, build, and test
        run: pnpm turbo run lint typecheck build test

  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-gateway
            file: apps/api-gateway/Dockerfile
          - name: identity-service
            file: apps/identity-service/Dockerfile
          - name: ledger-service
            file: apps/ledger-service/Dockerfile
          - name: documents-service
            file: apps/documents-service/Dockerfile
          - name: reporting-service
            file: apps/reporting-service/Dockerfile
          - name: invoicing-service
            file: apps/invoicing-service/Dockerfile
          - name: web
            file: apps/web/Dockerfile
            build-args: NEXT_PUBLIC_API_BASE_URL=http://127.0.0.1:3000/api/v1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          build-args: ${{ matrix.build-args || '' }}
